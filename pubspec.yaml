name: vton_auth
version: 1.0.0+1
description: Minimal Flutter web auth flow with JWT.
publish_to: none

environment:
  sdk: ">=2.19.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Auth & Network
  google_sign_in: ^6.2.1
  http: ^1.2.2
  shared_preferences: ^2.2.2

  # UI & Navigation
  url_launcher: ^6.3.1

  # Camera & Media
  image_picker: ^1.1.2
  camera: ^0.10.5+9
  permission_handler: ^11.3.1

  # 3D Model Viewer
  model_viewer_plus: ^1.9.3

  # State Management
  get: ^4.6.6

  # WebView
  webview_flutter: ^4.4.4

  # Icons
  cupertino_icons: ^1.0.8

  # Image handling
  cached_network_image: ^3.3.1

  # Utilities
  intl: ^0.19.0
  path_provider: ^2.1.3
  connectivity_plus: ^6.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

dependency_overrides:
  webview_flutter_android: 3.16.7

flutter:
  uses-material-design: true